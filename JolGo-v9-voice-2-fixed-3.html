<script>
(function() {
    const PASS = "Hantebalam07";
    const KEY = "jolgo_auth";
    if (sessionStorage.getItem(KEY) === "ok") return;
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0B2A3A 0%,#0e3a50 40%,#28B8B8 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;";
    overlay.innerHTML = `
        <div style="width:88px;height:88px;background:linear-gradient(145deg,#2DD4D4,#1a9090);border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 20px 60px rgba(40,184,184,0.5);margin-bottom:20px;">🏔</div>
        <div style="font-family:'Playfair Display',serif;font-size:52px;font-weight:800;color:white;letter-spacing:-2px;margin-bottom:6px;">JolGo</div>
        <div style="font-size:11px;letter-spacing:3px;color:rgba(45,212,212,0.85);text-transform:uppercase;margin-bottom:40px;">Travel Super App · Kyrgyzstan</div>
        <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:28px 24px;width:90%;max-width:360px;">
            <div style="color:white;font-size:16px;font-weight:600;text-align:center;margin-bottom:18px;">🔒 Введите пароль</div>
            <input id="jolgo-pass" type="password" placeholder="Пароль" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:16px;padding:14px 16px;font-size:16px;color:white;outline:none;margin-bottom:12px;" />
            <div id="jolgo-err" style="color:#ff6b6b;font-size:13px;text-align:center;margin-bottom:10px;display:none;">Неверный пароль</div>
            <button id="jolgo-btn" style="width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#28B8B8,#1a9090);color:white;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(40,184,184,0.4);">Войти</button>
        </div>
    `;
    document.body.appendChild(overlay);
    function tryLogin() {
        const val = document.getElementById("jolgo-pass").value;
        if (val === PASS) {
            sessionStorage.setItem(KEY, "ok");
            overlay.style.opacity = "0";
            overlay.style.transition = "opacity 0.5s";
            setTimeout(() => overlay.remove(), 500);
        } else {
            document.getElementById("jolgo-err").style.display = "block";
            document.getElementById("jolgo-pass").style.borderColor = "#ff6b6b";
            document.getElementById("jolgo-pass").value = "";
        }
    }
    document.getElementById("jolgo-btn").onclick = tryLogin;
    document.getElementById("jolgo-pass").onkeydown = e => { if(e.key === "Enter") tryLogin(); };
})();
</script>

/* ══════════════════════════════════
   BOTTOM DRAWER — draggable handle
══════════════════════════════════ */
function BottomDrawer({ isDark, panelBg, borderCol, txtCol, mutedCol, recPlaces, flyTo, TYPE_BG, TYPE_COLORS, MT }) {
    const [open, setOpen] = useState(false);
    const [dragging, setDragging] = useState(false);
    const startY = useRef(0);
    const startOpen = useRef(false);

    const onTouchStart = (e) => {
        startY.current = e.touches[0].clientY;
        startOpen.current = open;
        setDragging(true);
    };
    const onTouchEnd = (e) => {
        setDragging(false);
        const diff = startY.current - e.changedTouches[0].clientY;
        if (diff > 30) setOpen(true);
        else if (diff < -30) setOpen(false);
    };

    const handleH = 44; // collapsed handle height
    const expandedH = 230;

    return React.createElement("div", {
        style: {
            position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 1000,
            height: open ? expandedH : handleH,
            transition: dragging ? "none" : "height 0.32s cubic-bezier(0.4,0,0.2,1)",
            willChange: "height",
        }
    },
        React.createElement("div", {
            style: {
                position: "absolute", inset: 0,
                background: panelBg,
                backdropFilter: "blur(28px)",
                borderTop: `1px solid ${borderCol}`,
                borderRadius: "22px 22px 0 0",
                boxShadow: isDark ? "0 -4px 28px rgba(0,0,0,0.45)" : "0 -4px 28px rgba(28,31,46,0.10)",
                display: "flex", flexDirection: "column", overflow: "hidden",
            }
        },
            // ── Drag Handle ──
            React.createElement("div", {
                onTouchStart: onTouchStart,
                onTouchEnd: onTouchEnd,
                onClick: () => setOpen(v => !v),
                style: {
                    flexShrink: 0, display: "flex", flexDirection: "column",
                    alignItems: "center", justifyContent: "center",
                    padding: "10px 0 8px", cursor: "pointer", userSelect: "none",
                }
            },
                React.createElement("div", { style: { width: 36, height: 4, background: isDark ? "rgba(255,255,255,0.18)" : "rgba(0,0,0,0.12)", borderRadius: 2, marginBottom: 6 } }),
                React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
                    React.createElement("span", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 12, fontWeight: 700, color: mutedCol } },
                        open ? "▼ " + (MT ? MT.recTitle : "Рекомендуем посетить") : "⭐ " + (MT ? MT.recTitle : "Рекомендуем посетить") + " ▲"
                    )
                )
            ),
            // ── Content (only visible when open) ──
            open && React.createElement("div", { style: { flex: 1, overflow: "hidden", padding: "0 12px 16px" } },
                React.createElement("div", { style: { display: "flex", gap: 10, overflowX: "auto", scrollbarWidth: "none", paddingBottom: 2 } },
                    recPlaces.map(p => React.createElement("div", {
                        key: p.id, onClick: () => { flyTo(p); setOpen(false); },
                        style: {
                            flexShrink: 0, width: 118,
                            background: isDark ? "rgba(255,255,255,0.05)" : "white",
                            border: `1px solid ${borderCol}`,
                            borderRadius: 16, padding: "10px", cursor: "pointer",
                            boxShadow: isDark ? "none" : "0 2px 10px rgba(28,31,46,0.07)",
                            transition: "all 0.18s",
                        },
                        onMouseOver: e => { e.currentTarget.style.borderColor = TYPE_COLORS[p.type]; e.currentTarget.style.transform = "translateY(-2px)"; },
                        onMouseOut:  e => { e.currentTarget.style.borderColor = borderCol; e.currentTarget.style.transform = "none"; }
                    },
                        React.createElement("div", { style: { width: 34, height: 34, borderRadius: 10, background: TYPE_BG[p.type], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, marginBottom: 6 } }, p.emoji),
                        React.createElement("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 700, color: txtCol, lineHeight: 1.3, marginBottom: 3, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" } }, p.name),
                        React.createElement("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 10, color: TYPE_COLORS[p.type], fontWeight: 700 } }, "⭐ " + p.rating)
                    ))
                )
            )
        )
    );
}

async function searchByCategory(filterTags, lat, lng) {
    const r = 15000;

    if (filterTags.amenity) conditions.push(`node["amenity"~"${filterTags.amenity}"](around:${r},${lat},${lng});`);
    if (filterTags.shop)    conditions.push(`node["shop"~"${filterTags.shop}"](around:${r},${lat},${lng});`);

    if (filterTags.leisure) conditions.push(`node["leisure"~"${filterTags.leisure}"](around:${r},${lat},${lng});`);
    if (filterTags.amenity) conditions.push(`way["amenity"~"${filterTags.amenity}"](around:${r},${lat},${lng});`);
    if (filterTags.shop)    conditions.push(`way["shop"~"${filterTags.shop}"](around:${r},${lat},${lng});`);
    const q = `[out:json][timeout:18];(${conditions.join("")});out center 40;`;
    try {
        const res = await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:"data="+encodeURIComponent(q)});
        const d = await res.json();
        const seen = new Set();
        return (d.elements||[]).map(el=>{
            const lat2=el.lat||(el.center&&el.center.lat)||0, lng2=el.lon||(el.center&&el.center.lon)||0;
            const tags=el.tags||{};
            const name=tags["name:ru"]||tags.name||tags["name:en"]||tags["name:ky"]||"";
            if(!name||seen.has(name+lat2)) return null;
            seen.add(name+lat2);
            const type=osmTagToType(tags);
            return {id:"osm_"+el.id,lat:lat2,lng:lng2,name,addr:[tags["addr:street"],tags["addr:housenumber"]].filter(Boolean).join(", ")||"",type,emoji:osmTagToEmoji(tags),tags,website:tags.website||null,phone:tags.phone||null,opening_hours:tags.opening_hours||null};
        }).filter(p=>p&&p.lat&&p.lng&&p.name);
    } catch { return []; }
}

async function searchOSM(query, lat, lng) {
    const r = 80000;
    const safe = query.replace(/"/g,"").replace(/[\\^$.|?*+(){}[\]]/g,"\\$&");
    // Search by name across ALL types of venues
    const q = `[out:json][timeout:18];(
      node["name"~"${safe}",i](around:${r},${lat},${lng});
      node["name:ru"~"${safe}",i](around:${r},${lat},${lng});
      node["name:en"~"${safe}",i](around:${r},${lat},${lng});
      way["name"~"${safe}",i](around:${r},${lat},${lng});
      way["name:ru"~"${safe}",i](around:${r},${lat},${lng});
      relation["name"~"${safe}",i](around:${r},${lat},${lng});
    );out center 30;`;
    try {
        const res = await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:"data="+encodeURIComponent(q)});
        const d = await res.json();
        const seen = new Set();
        const results = (d.elements||[]).map(el=>{
            const lat2=el.lat||(el.center&&el.center.lat)||0, lng2=el.lon||(el.center&&el.center.lon)||0;
            const tags=el.tags||{};
            // Skip elements with no meaningful type
            const hasType = tags.amenity||tags.shop||tags.tourism||tags.leisure||tags.office||tags.craft||tags.highway;
            if(!hasType) return null;
            const name=tags["name:ru"]||tags.name||tags["name:en"]||tags["name:ky"]||"";
            if(!name||seen.has(name+lat2)) return null;
            seen.add(name+lat2);
            const type=osmTagToType(tags);
            return {
                id:"osm_"+el.id, lat:lat2, lng:lng2, name,
                addr:[tags["addr:street"],tags["addr:housenumber"]].filter(Boolean).join(", ")||tags["addr:city"]||"",
                type, emoji:osmTagToEmoji(tags), tags,
                website:tags.website||tags["contact:website"]||null,
                phone:tags.phone||tags["contact:phone"]||tags["contact:mobile"]||null,
                opening_hours:tags.opening_hours||null,
                cuisine:tags.cuisine||null,
            };
        }).filter(p=>p&&p.lat&&p.lng&&p.name);
        // Sort: exact name matches first, then partial
        results.sort((a,b)=>{
            const aq = a.name.toLowerCase().startsWith(safe.toLowerCase()) ? 0 : 1;
            const bq = b.name.toLowerCase().startsWith(safe.toLowerCase()) ? 0 : 1;
            return aq - bq;
        });
        return results.slice(0,20);
    } catch { return []; }
}

async function fetchWikiImage(name) {
    try {
        const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
        const d = await r.json();
        return Object.values(d.query?.pages||{})[0]?.thumbnail?.source||null;
    } catch { return null; }
}

function TranslatorScreen({ setScreen }) {
    const C = useC();
    const T = useLang();
    const [fromLang, setFromLang] = React.useState("ru");
    const [toLang, setToLang] = React.useState("en");
    const [inputText, setInputText] = React.useState("");
    const [result, setResult] = React.useState("");
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState(null);
    const [isListening, setIsListening] = React.useState(false);
    const [micStatus, setMicStatus] = React.useState("idle");
    const [interimText, setInterimText] = React.useState("");
    const [speakingInput, setSpeakingInput] = React.useState(false);
    const [speakingResult, setSpeakingResult] = React.useState(false);
    const recognitionRef = React.useRef(null);
    const finalTranscriptRef = React.useRef("");

    const LANG_OPTIONS = [
        { code: "ru", label: "Русский", flag: "🇷🇺" },
        { code: "en", label: "English", flag: "🇬🇧" },
        { code: "ky", label: "Кыргызча", flag: "🇰🇬" },
        { code: "tr", label: "Türkçe", flag: "🇹🇷" },
        { code: "zh", label: "中文", flag: "🇨🇳" },
    ];

    // Map app lang codes to BCP-47 for speech APIs
    const SPEECH_LANG_MAP = {
        ru: "ru-RU", en: "en-US", ky: "ky-KG", tr: "tr-TR", zh: "zh-CN"
    };

    const getLangLabel = (code) => {
        const l = LANG_OPTIONS.find(x => x.code === code);
        return l ? l.flag + " " + l.label : code;
    };

    const swap = () => {
        const tmp = fromLang;
        setFromLang(toLang);
        setToLang(tmp);
        setInputText(result);
        setResult(inputText);
    };

    // ── Voice Input (Speech Recognition) ──
    const translateText = async (text) => {
        if (!text.trim()) return;
        setLoading(true);
        setError(null);
        setResult("");
        const langMap = { ru: "ru", en: "en", ky: "ky", tr: "tr", zh: "zh-CN" };
        const from = langMap[fromLang] || fromLang;
        const to = langMap[toLang] || toLang;
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
                const el = document.createElement("textarea");
                el.innerHTML = data.responseData.translatedText;
                setResult(el.value);
            } else {
                setError("Ошибка перевода. Попробуйте ещё раз.");
            }
        } catch(e) {
            setError("Нет интернета. Проверьте соединение.");
        }
        setLoading(false);
    };

    const translate = () => translateText(inputText);

    const stopListening = () => {
        if (recognitionRef.current) {
            try { recognitionRef.current.stop(); } catch(e) {}
            recognitionRef.current = null;
        }
        setIsListening(false);
        setInterimText("");
    };

    const startListening = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            setMicStatus("unsupported");
            return;
        }
        if (isListening) {
            stopListening();
            return;
        }

        // Stop any TTS before recording
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        finalTranscriptRef.current = "";
        setInterimText("");
        setInputText("");
        setResult("");
        setError(null);
        setMicStatus("requesting");

        const recog = new SpeechRecognition();
        recog.lang = SPEECH_LANG_MAP[fromLang] || "ru-RU";
        recog.continuous = true;
        recog.interimResults = true;
        recog.maxAlternatives = 1;

        recog.onstart = () => {
            setIsListening(true);
            setMicStatus("listening");
        };

        recog.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                const t = e.results[i][0].transcript;
                if (e.results[i].isFinal) {
                    finalTranscriptRef.current += t;
                    setInputText(finalTranscriptRef.current);
                } else {
                    interim += t;
                }
            }
            setInterimText(interim);
        };

        recog.onerror = (e) => {
            if (e.error === "not-allowed" || e.error === "permission-denied") {
                setMicStatus("error");
            } else if (e.error === "no-speech") {
                setMicStatus("idle");
            } else {
                setMicStatus("idle");
            }
            setIsListening(false);
            setInterimText("");
        };

        recog.onend = () => {
            setIsListening(false);
            setInterimText("");
            recognitionRef.current = null;
            const final = finalTranscriptRef.current.trim();
            if (final && micStatus !== "error") {
                setMicStatus("processing");
                translateText(final).then(() => setMicStatus("idle"));
            } else if (micStatus !== "error") {
                setMicStatus("idle");
            }
        };

        try {
            recog.start();
            recognitionRef.current = recog;
        } catch(e) {
            if (e.name === "NotAllowedError" || e.name === "SecurityError") {
                setMicStatus("error");
            } else {
                setMicStatus("unsupported");
            }
        }
    };

    // ── Text-to-Speech ──
    const speak = (text, langCode, onStart, onEnd) => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = SPEECH_LANG_MAP[langCode] || "ru-RU";
        utter.rate = 0.9;
        utter.pitch = 1;
        utter.onstart = onStart;
        utter.onend = onEnd;
        utter.onerror = onEnd;
        window.speechSynthesis.speak(utter);
    };

    const speakInput = () => {
        if (!inputText.trim()) return;
        if (speakingInput) { window.speechSynthesis.cancel(); setSpeakingInput(false); return; }
        speak(inputText, fromLang, () => setSpeakingInput(true), () => setSpeakingInput(false));
    };

    const speakResult = () => {
        if (!result.trim()) return;
        if (speakingResult) { window.speechSynthesis.cancel(); setSpeakingResult(false); return; }
        speak(result, toLang, () => setSpeakingResult(true), () => setSpeakingResult(false));
    };

    const [showFromPicker, setShowFromPicker] = React.useState(false);
    const [showToPicker, setShowToPicker] = React.useState(false);

    const QUICK_PHRASES = {
